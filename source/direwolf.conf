#############################################
# DIRE WOLF - USB AUDIO + VOX Version 2.0
#############################################

MYCALL EA2XXX-10

# IMPORTANTE: usar identificador persistente
ADEVICE plughw:CARD=Device,DEV=0

CHANNEL 0
MODEM 1200

#############################################
# KISS TCP (REQUERIDO POR EL PROYECTO)
#############################################

KISSPORT 8100

#############################################
# VOX (SIN CONTROL PTT POR GPIO)
#############################################

PTT VOX

#############################################
# AJUSTES CRÍTICOS PARA VOX
#############################################

TXDELAY 30
TXTAIL 5
SLOTTIME 10
PERSIST 50

#############################################
# NIVELES AUDIO (CRÍTICO EN VOX)
#############################################

# Ajustar manualmente con alsamixer
# Valores iniciales recomendados

# Entrada (RX)
ARATE 48000

# Salida (TX)
# Se controla vía alsamixer

#############################################
# BEACON OPCIONAL
#############################################

PBEACON delay=1 every=30 symbol="R&" lat=41.6488 long=-0.8891 comment="MiniBroker USB APRS"